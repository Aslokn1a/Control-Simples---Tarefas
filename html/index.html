<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTRL SIMPLES</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="/js/script.js" type="text/javascript"></script>
    <link rel="stylesheet" href="/css/style.css">    
</head>
<body class="" style="background-color: #ffe8be;">
    <nav class=" p-3 navbar navbar-expand-lg bg-body-primary" style="background-color: #f5e44c;" >
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <img src="/img/logo.png" alt="Logo" width="30" height="24" class="d-inline-block align-text-top">
                CTRL SIMPLES - TAREFAS</a>
        </div>
    </nav>
    
    <div class="container  text-center "  >
        <div class=" rounded-bottom p-4     row align-items-start">
            <div class=" h2 p-3 col">
                Crie uma nova tarefa a seguir:
            </div>
            <form>
                <div class=" p-3 mb-3">
                    <label for="tarefa" class="form-label">TAREFA</label>
                    <input type="text" class="form-control"id="tarefa" aria-describedby="tarefa"/>
                </div>
                <div class="col ">
                    <button type="button" onclick="CriarTarefa();" class="btn btn-dark w-25"><h5>CRIAR TAREFA</h5></button>
                </div>
            </form>
            
        </div>
        
    </div>
    <br>
    <div class=" text-center border-bottom  border-dark p-4  row  gap-5" style="background-color: #faed7a;"  >
            <div class="rounded bg-warning  border-light col " >
                <h4>Tarefas pendentes </h4>
            </div>
            
            <div class=" rounded bg-success   border-light col">
                <h4>Tarefas concluidas</h4>
            </div>
            
        </div>
        
        <div class=" rounded p-2  row align-items-start  mh-auto" style="min-height:50vh;">
            <div class="col  " id="Task">

            </div>

            <span class="col">
    
            </span>
            
            <div class=" col" id="Finish">

            </div>
            
        </div>
      
    
    <footer class="p-3" style="background-color: #f5e44c;">
        <p class="text-start">Todos os direitos reservados</p>
        <h2>CTRL SIMPLES - Tarefas</h2>
    </footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
