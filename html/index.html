<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="/js/script.js" type="text/javascript"></script>
    <link rel="stylesheet" href="/css/style.css">

<body class="bg-warning-subtle">
    <nav class=" p-3 navbar navbar-expand-lg bg-body-primary" style="background-color: #faed7a;" >
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <img src="/img/logo.png" alt="Logo" width="30" height="24" class="d-inline-block align-text-top">
                CTRL SIMPLES - TAREFAS</a>
        </div>
    </nav>
    
    <div class=" container text-center " >
        <div class=" rounded-bottom p-4 bg-light    row align-items-start">
            <div class=" h2 p-3 col">
                Crie uma nova tarefa a seguir:
            </div>
            <form>
                <div class=" p-3 mb-3">
                    <label for="tarefa" class="form-label">Nome da tarefa</label>
                    <input type="text" class="form-control"id="tarefa" aria-describedby="Tarefa"/>
                </div>
                <div class="col-2">
                    <button onclick="CriarTarefa();" class="btn btn-dark">Criar Tarefa</button>
                </div>
            </form>
            
        </div>
        <div class="border-bottom  border-dark p-3 row align-items-start">
            <div class="rounded bg-warning border-bottom border-light col " >
                <h4>Tarefas pendentes </h4>
            </div>
            <span class=" col"></span>
            <div class=" rounded bg-success  border-bottom border-light col">
                <h4>Tarefas concluidas</h4>
            </div>
            
        </div>
        <Br>
        <div class=" rounded p-2 bg-light row align-items-start" style="height:50vh;">
            <div class="col  " id="Task">
            </div>
            <span class="col"></span>
            <div class="bg-success col" class="Completed">
            
            </div>
            
        </div>
    </div>
    <br>
    <footer class="p-3">
        <p class="text-start">Todos os direitos reservados</p>
        <h2>CTRL SIMPLES - Tarefas</h2>
    </footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
